services:
  - type: web
    name: ai-api-project
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: APP_NAME
        value: AI API Project
      - key: APP_VERSION
        value: 1.0.0
      - key: DEBUG
        value: false
      - key: LOG_LEVEL
        value: INFO
